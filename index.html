<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BUDE Intel V13</title>

<style>
body{margin:0;background:#0b0f19;color:#e5e7eb;font-family:system-ui;padding:12px}
h1{text-align:center;color:#00d4aa;font-size:1.1rem}
.card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:12px;margin-top:10px}
input,button{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:1px solid #1f2937;background:#0b0f19;color:#fff}
button{background:#00d4aa;color:#000;font-weight:700}
.row{display:flex;justify-content:space-between;font-size:.85rem;margin:4px 0}
.small{font-size:.75rem;color:#94a3b8}
.bad{color:#ef4444}
.warn{color:#f59e0b}
.ok{color:#00d4aa}
.hidden{display:none}
.tag{font-size:.65rem;background:#1f2937;padding:2px 6px;border-radius:6px}
</style>
</head>

<body>

<h1>🧠 BUDE INTEL V13 (HELIUS FAST MODE)</h1>

<div class="card">
  <input id="ca" placeholder="Enter Solana Token CA">
  <button onclick="analyze()">Analyze</button>
</div>

<div class="card hidden" id="tokenBox"></div>
<div class="card hidden" id="holderBox"></div>
<div class="card hidden" id="intelBox"></div>

<script>

const HELIUS="https://mainnet.helius-rpc.com/?api-key=YOUR_API_KEY";

// 🧠 FAST CACHE
const cache=new Map();

/* ---------------- HELIUS WRAPPER ---------------- */

async function helius(method,params){

  const key=method+JSON.stringify(params);
  if(cache.has(key)) return cache.get(key);

  const r=await fetch(HELIUS,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      jsonrpc:"2.0",
      id:1,
      method,
      params
    })
  });

  const j=await r.json();
  cache.set(key,j);
  return j;
}

/* ---------------- TOKEN META ---------------- */

async function getMeta(mint){

  try{
    const j=await fetch(`https://api.helius.xyz/v0/tokens/meta?mint=${mint}&api-key=YOUR_API_KEY`);
    return await j.json();
  }catch(e){
    return null;
  }
}

/* ---------------- HOLDERS (REAL FIX) ---------------- */

async function getHolders(mint){

  try{
    const j=await fetch(`https://api.helius.xyz/v0/tokens/holders?mint=${mint}&limit=20&api-key=YOUR_API_KEY`);
    const d=await j.json();

    return (d.holders||[]).map(h=>({
      address:h.owner,
      amount:h.amount,
      pct:h.percentage||0
    }));

  }catch(e){
    return [];
  }
}

/* ---------------- ANALYZE ---------------- */

async function analyze(){

  const ca=document.getElementById("ca").value.trim();
  if(!ca) return;

  const meta=await getMeta(ca);
  const holders=await getHolders(ca);

  const supply=meta?.supply||0;

  renderToken(meta,holders,supply);
  renderHolders(holders);
  renderIntel(holders);
}

/* ---------------- UI ---------------- */

function renderToken(meta,h,supply){

  document.getElementById("tokenBox").classList.remove("hidden");

  document.getElementById("tokenBox").innerHTML=`
    <b>🪙 TOKEN</b>
    <div class="row"><span>Name</span><span>${meta?.name||"Unknown"}</span></div>
    <div class="row"><span>Symbol</span><span>${meta?.symbol||"?"}</span></div>
    <div class="row"><span>Supply</span><span>${supply}</span></div>
    <div class="row"><span>Holders</span><span>${h.length}</span></div>
  `;
}

function renderHolders(h){

  document.getElementById("holderBox").classList.remove("hidden");

  if(!h.length){
    document.getElementById("holderBox").innerHTML="<b>HOLDERS</b><div class='small'>No data (check API key)</div>";
    return;
  }

  document.getElementById("holderBox").innerHTML=`
    <b>👥 TOP HOLDERS</b>
    ${h.map((x,i)=>`
      <div class="row">
        <span>${i+1}. ${x.address.slice(0,6)}...</span>
        <span>${x.pct.toFixed(2)}%</span>
      </div>
    `).join("")}
  `;
}

/* ---------------- INTEL ENGINE ---------------- */

function renderIntel(h){

  const el=document.getElementById("intelBox");
  el.classList.remove("hidden");

  let top=h[0]?.pct||0;
  let score=0;
  let flags=[];

  if(top>40){score+=40;flags.push("HIGH CONCENTRATION");}
  if(top>20){score+=20;flags.push("WHALE CONTROLLED");}
  if(h.length<10){score+=20;flags.push("LOW HOLDER COUNT");}

  let label="🟢 CLEAN";
  if(score>60) label="🔴 HIGH RISK";
  else if(score>30) label="🟠 SUSPICIOUS";

  el.innerHTML=`
    <b>🧠 INTELLIGENCE</b>
    <div class="row"><span>Status</span><span>${label}</span></div>
    <div class="row"><span>Score</span><span>${score}/100</span></div>
    <div class="small">${flags.join("<br>")||"No anomalies"}</div>
  `;
}

</script>

</body>
</html>
