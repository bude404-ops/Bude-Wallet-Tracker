<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Board Pro</title>
    <style>
        body { font-family: sans-serif; background: #2c2420; color: #f4f4f4; padding: 15px; }
        
        /* Mascot Header Theme */
        .mascot-container { text-align: center; margin-bottom: 20px; }
        .mascot { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #ffd600; }
        
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #3e3632; color: white; border: 1px solid #6b5f59; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-green { background: #ffd600; color: #2c2420; }
        .btn-blue { background: #2979ff; color: white; }
        .checkbox-row { margin: 10px 0; display: flex; align-items: center; color: #ccc; }
        .ep-card { background: #3e3632; padding: 15px; margin: 10px 0; border: 1px solid #ffd600; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="mascot-container">
        <!-- Displaying 1000013133.jpg as the helper mascot -->
        <img src="1000013133.jpg" class="mascot" alt="Helper Mascot">
        <h2>Story Board Pro</h2>
    </div>
    
    <input type="text" id="name" placeholder="Name">
    <input type="text" id="role" placeholder="Role">
    <input type="text" id="skills" placeholder="Skills (comma separated)">
    <input type="text" id="imgUrl" placeholder="Image URL">
    <textarea id="backstory" placeholder="Backstory"></textarea>
    
    <div class="checkbox-row">
        <input type="checkbox" id="isBg" style="width: auto; margin-right: 10px;"> 
        <label for="isBg">Set as Background Character Only</label>
    </div>
    
    <button class="btn-green" onclick="saveChar()">SAVE CHARACTER</button>

    <h3>Episode Generation</h3>
    <input type="text" id="theme" placeholder="Adventure Theme...">
    <button class="btn-blue" onclick="generateScript()">GENERATE SCRIPT</button>

    <div id="epList"></div>

    <script>
        let chars = JSON.parse(localStorage.getItem('story_chars') || '[]');
        let eps = JSON.parse(localStorage.getItem('story_eps') || '[]');

        function saveChar() {
            chars.push({ 
                name: document.getElementById('name').value,
                role: document.getElementById('role').value,
                skills: document.getElementById('skills').value,
                imgUrl: document.getElementById('imgUrl').value,
                backstory: document.getElementById('backstory').value,
                isBackground: document.getElementById('isBg').checked 
            });
            localStorage.setItem('story_chars', JSON.stringify(chars));
            alert("Character Saved!");
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
        }

        function generateScript() {
            let leads = chars.filter(c => !c.isBackground);
            let bgs = chars.filter(c => c.isBackground);
            
            if(leads.length === 0) { alert("Add at least one lead character!"); return; }
            if(bgs.length < 2) { alert("Need at least 2 background characters!"); return; }
            
            let lead = leads[Math.floor(Math.random() * leads.length)];
            let extra1 = bgs[Math.floor(Math.random() * bgs.length)];
            let extra2 = bgs.filter(c => c !== extra1)[Math.floor(Math.random() * (bgs.length - 1))];
            
            let script = `<strong>Theme:</strong> ${document.getElementById('theme').value}<br>` +
                         `<strong>Lead:</strong> ${lead.name} (${lead.role})<br>` +
                         `<strong>Background:</strong> ${extra1.name} & ${extra2.name} in the scene.`;
            
            eps.push(script);
            localStorage.setItem('story_eps', JSON.stringify(eps));
            render();
        }

        function render() {
            document.getElementById('epList').innerHTML = eps.map(e => `<div class="ep-card">${e}</div>`).join('');
        }
        render();
    </script>
</body>
</html>
