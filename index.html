<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Story Board Pro</title>
    <style>
        body { font-family: sans-serif; background: #2c2420; color: #f4f4f4; padding: 15px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #3e3632; color: white; border: 1px solid #6b5f59; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-main { background: #ffd600; color: #2c2420; }
        .btn-gen { background: #2979ff; color: white; }
        .ep-card { background: #3e3632; padding: 15px; margin: 10px 0; border: 1px solid #ffd600; border-radius: 8px; }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <img src="1000013133.jpg" style="width: 100px; border-radius: 50%; border: 4px solid #ffd600;">
        <h2>Story Board Pro</h2>
    </div>

    <h3>Batch Import (JSON)</h3>
    <textarea id="batchInput" placeholder='[{"name":"Hero","role":"Leader","skills":"Strategy","isBackground":false}]'></textarea>
    <button class="btn-main" onclick="batchImport()">IMPORT BATCH</button>

    <h3>Episode Generation</h3>
    <input type="text" id="theme" placeholder="Adventure Theme (e.g. Strategy, Building)...">
    <button class="btn-gen" onclick="generateScript()">GENERATE SKILL-MATCHED SCRIPT</button>

    <div id="epList"></div>

    <script>
        let chars = JSON.parse(localStorage.getItem('story_chars') || '[]');

        function batchImport() {
            let data = JSON.parse(document.getElementById('batchInput').value);
            chars = [...chars, ...data];
            localStorage.setItem('story_chars', JSON.stringify(chars));
            alert("Characters imported!");
        }

        function generateScript() {
            let theme = document.getElementById('theme').value.toLowerCase();
            let leads = chars.filter(c => !c.isBackground);
            let bgs = chars.filter(c => c.isBackground);
            
            // Skill-based lead selection
            let lead = leads.find(c => c.skills.toLowerCase().includes(theme)) || leads[Math.floor(Math.random() * leads.length)];
            
            if (!lead) { alert("Add at least one lead character!"); return; }
            if (bgs.length < 2) { alert("Need at least 2 background characters!"); return; }
            
            let extra1 = bgs[Math.floor(Math.random() * bgs.length)];
            let extra2 = bgs.filter(c => c !== extra1)[Math.floor(Math.random() * (bgs.length - 1))];
            
            let eps = JSON.parse(localStorage.getItem('story_eps') || '[]');
            eps.push(`<strong>Theme:</strong> ${theme}<br><strong>Lead:</strong> ${lead.name} (${lead.role})<br><strong>Backgrounds:</strong> ${extra1.name} & ${extra2.name} are present.`);
            localStorage.setItem('story_eps', JSON.stringify(eps));
            render();
        }

        function render() {
            document.getElementById('epList').innerHTML = JSON.parse(localStorage.getItem('story_eps') || '[]').map(e => `<div class="ep-card">${e}</div>`).join('');
        }
        render();
    </script>
</body>
</html>
