name: BudE StoryBoard AI Evolution System


on:

  push:

    branches:

      - main

    paths:

      - "updates/**"
      - "versions.json"
      - "package.json"
      - "vite.config.ts"


  workflow_dispatch:



permissions:

  contents: write



jobs:


  evolution:


    name: Execute BudE Evolution Updates


    runs-on: ubuntu-latest



    steps:



    - name: Checkout Repository

      uses: actions/checkout@v4

      with:

        fetch-depth: 0



    - name: Setup Node

      uses: actions/setup-node@v4

      with:

        node-version: 20



    - name: Run Evolution Engine

      run: |

        node updates/update-engine.js



    - name: Validate System

      run: |

        test -f versions.json

        test -d src

        test -d updates

        echo "System validation complete"



    - name: Install Dependencies

      if: hashFiles('package.json') != ''

      run: |

        npm install



    - name: Build Test

      if: hashFiles('package.json') != ''

      run: |

        npm run build



    - name: Commit Evolution Changes

      run: |


        git config user.name "BudE Evolution Bot"

        git config user.email "actions@github.com"


        git add src updates versions.json package.json vite.config.ts index.html


        git commit -m "BudE evolution update [skip ci]" || echo "No changes"


        git push
