name: BudE Evolution System

on:

  push:

    branches:
      - main

    paths:
      - "updates/**"

  workflow_dispatch:


permissions:

  contents: write


jobs:

  evolution:


    runs-on: ubuntu-latest


    steps:


    - name: Checkout
      uses: actions/checkout@v4



    - name: Setup Node
      uses: actions/setup-node@v4

      with:

        node-version: 20



    - name: Run Evolution Engine
      run: |

        node updates/update-engine.js



    - name: Validate Build

      run: |

        npm install

        npm run build



    - name: Commit Evolution

      run: |

        git config user.name "BudE Evolution Bot"

        git config user.email "actions@github.com"


        git add .


        git commit -m "BudE automatic evolution update" || echo "No changes"


        git push
