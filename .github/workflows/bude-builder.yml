name: BudE Genesis Builder

on:
  workflow_dispatch:
  push:
    branches:
      - main


jobs:

  build:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"


    - name: Run BudE Seed
      run: |
        python seed.py


    - name: Verify Build
      run: |
        test -d dashboard
        test -d bude-engine
        test -d modules

        echo "BudE Build Verified"
